# kernels.conf — Kernel test matrix (vendor kernels)
#
# Each line defines a kernel to test. Run download.sh to fetch all.
# Kernels are NOT stored in git — download.sh reproduces the setup.
#
# Format: name|version|boot_method|tier|source
#
#   name         Directory name under test/kernels/
#   version      Expected kernel major.minor
#   boot_method  qemu (<4.9) or virtme (>=4.9)
#   tier         1=must test, 2=should test, 3=nice to have
#   source       How to download:
#                  deb:<url>[,<url>]  Direct .deb URL(s)
#                  rpm:<url>[,<url>]  Direct RPM URL(s)
#                  ppa:<dir>          Ubuntu mainline PPA (auto-discover)
#
# These are VENDOR kernels with distro-specific patches — not mainline.
# Vendor patches affect quota behavior (RHEL backports, Debian patches).
# Mainline PPA is only used for Arch/Gentoo coverage (no vendor kernel).
#
# Package styles per distro:
#   Ubuntu:   linux-image-unsigned-* + linux-modules-* (2 .debs)
#   Debian:   linux-image-*-amd64[-unsigned] (1 .deb, modules included)
#   CentOS 7: kernel-* (1 RPM, modules included)
#   EL8:      kernel-core + kernel-modules (2 RPMs)
#   EL9/F39+: kernel-core + kernel-modules-core + kernel-modules (3 RPMs)
#   openSUSE: kernel-default (1 RPM)
#   Amazon:   kernel-* (1 RPM)
#
# See research/kernel-matrix.org for full rationale.

# --- Tier 1: Must Test ---
# Actively supported distros with large server user bases.

