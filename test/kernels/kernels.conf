# kernels.conf — Kernel test matrix
#
# Defines every kernel to test quotatool against. Anyone cloning the
# repo runs download.sh which reads this file and fetches everything.
#
# Format: name|version|boot_method|tier|source
#
#   name         Directory name under test/kernels/
#   version      Expected major.minor (boot method detection + verification)
#   boot_method  qemu (<4.9) or virtme (>=4.9)
#   tier         1=must test, 2=should test, 3=nice to have
#   source       How to download. Prefixed by type:
#                  ppa:<dir>        Ubuntu mainline PPA directory
#                  rpm:<url>[,url]  Direct RPM package URL(s)
#                  deb:<url>[,url]  Direct .deb package URL(s)
#                  unavailable      Not yet downloadable (skip)
#
# PPA base: https://kernel.ubuntu.com/mainline/
# PPA scraping: download.sh fetches the index page and auto-discovers
# the correct .deb filenames (linux-image-*-generic + linux-modules-*).
# This is reproducible because PPA URLs are permanent archives.
#
# Note: PPA kernels are mainline builds with Ubuntu config — they include
# XFS, quota, and 9p modules but lack vendor-specific patches (RHEL
# backports, Debian patches, etc.). Vendor kernels can be added later
# by changing the source field to rpm: or deb: with direct URLs.
#
# See research/kernel-matrix.org for full rationale and coverage info.

# --- Tier 1: Must Test ---
# Actively supported distros with large server user bases.

